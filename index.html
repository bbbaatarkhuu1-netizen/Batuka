<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadUp Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="header">
    <div class="logo">Read<span>Up</span></div>

    <nav class="nav">
      <button class="nav-item active">📚 Номын сан</button>
      <button class="nav-item">🧠 Үгийн сан</button>
      <button class="nav-item">📝 Тест</button>
      <button class="nav-item">📖 Дүрэм</button>
    </nav>

    <button class="profile-btn">👤</button>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Premium English Learning</h1>
      <p>Үг дээр дараад орчуулга харах, хадгалах, тест өгөх.</p>
    </section>

    <section class="grid">
      <article class="card">
        <div class="card-top">
          <span class="level a1">A1</span>
          <span class="time">5 min</span>
        </div>
        <h3>Morning Routine</h3>
        <p>Өдөр тутмын энгийн үйлдлүүдийн тухай уншлага.</p>
        <button>Унших →</button>
      </article>

      <article class="card">
        <div class="card-top">
          <span class="level a2">A2</span>
          <span class="time">7 min</span>
        </div>
        <h3>The Solar System</h3>
        <p>Сансрын тухай сонирхолтой уншлага.</p>
        <button>Унших →</button>
      </article>

      <article class="card">
        <div class="card-top">
          <span class="level b1">B1</span>
          <span class="time">10 min</span>
        </div>
        <h3>Climate Change</h3>
        <p>Орчны өөрчлөлтийн талаарх ахисан түвшний текст.</p>
        <button>Унших →</button>
      </article>
    </section>
  </main>

</body>
</html>
