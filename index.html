<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadUp</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#060810;
  --surface:#0b0e1a;
  --surface2:#101425;
  --surface3:#161b2e;
  --border:rgba(80,200,255,0.08);
  --border-hover:rgba(80,200,255,0.28);
  --text:#e8f4ff;
  --text-secondary:#9bb8d4;
  --muted:#4d6a82;
  --accent:#00e5ff;
  --accent-dim:rgba(0,229,255,0.10);
  --accent-glow:rgba(0,229,255,0.30);
  --accent2:#c8ff00;
  --accent2-dim:rgba(200,255,0,0.10);
  --gold:#ffb700;
  --gold-dim:rgba(255,183,0,0.12);
  --green:#00ffb3;
  --green-dim:rgba(0,255,179,0.10);
  --red:#ff4d6d;
  --red-dim:rgba(255,77,109,0.10);
  --tag-bg:rgba(0,229,255,0.08);
  --radius:12px;
  --radius-sm:7px;
  --radius-lg:18px;
}

/* ── FONTS ── */
body{
  font-family:'Space Grotesk',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* Subtle noise grain overlay */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:9998;
}

/* Ambient glow background */
body::after{
  content:'';
  position:fixed;
  top:-20vh;
  left:50%;
  transform:translateX(-50%);
  width:100vw;
  height:70vh;
  background:
    radial-gradient(ellipse at 30% 50%, rgba(0,229,255,0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 40%, rgba(200,255,0,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(0,255,179,0.04) 0%, transparent 40%);
  pointer-events:none;
  z-index:0;
}

/* ── ICONS ── */
.ic{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;}
.ic svg{width:1em;height:1em;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none;}
.nav-tab .ic svg{width:15px;height:15px;}
.ic-sm svg{width:13px;height:13px;}
.ic-lg svg{width:20px;height:20px;}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(6,8,16,0.92);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid rgba(0,229,255,0.15);
  box-shadow:0 1px 0 rgba(0,229,255,0.06), 0 4px 32px rgba(0,0,0,0.5);
  padding:0 24px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
}

.logo{
  font-family:'Syne',sans-serif;
  font-size:1.4rem;
  font-weight:800;
  color:var(--text);
  letter-spacing:0.04em;
  text-transform:uppercase;
}
.logo em{
  color:var(--accent);
  font-style:normal;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 8px rgba(0,229,255,0.5));
}

.nav-tabs{display:flex;gap:2px;background:rgba(0,229,255,0.04);padding:4px;border-radius:10px;border:1px solid rgba(0,229,255,0.10);}

.nav-tab{
  padding:7px 15px;
  background:transparent;border:none;
  font-family:'Space Grotesk',sans-serif;
  font-size:0.75rem;font-weight:600;
  color:var(--muted);
  cursor:pointer;
  border-radius:7px;
  transition:all 0.2s ease;
  position:relative;
  display:flex;align-items:center;gap:5px;
  letter-spacing:0.03em;
  text-transform:uppercase;
}
.nav-tab.active{
  background:rgba(0,229,255,0.10);
  color:var(--accent);
  box-shadow:0 0 12px rgba(0,229,255,0.15),inset 0 1px 0 rgba(0,229,255,0.1);
}
.nav-tab:hover:not(.active){color:var(--text-secondary);}

.nav-badge{
  position:absolute;top:-3px;right:-3px;
  background:linear-gradient(135deg,#00e5ff,#00c4d4);
  color:#0a0a0a;font-size:0.5rem;font-weight:700;
  font-family:'JetBrains Mono',monospace;
  min-width:14px;height:14px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;padding:0 3px;
  box-shadow:0 0 8px var(--accent-glow);
}

/* ── SCREENS ── */
.screen{display:none;}
.screen.active{display:block;}

/* ── LIBRARY ── */
.library-header{
  padding:36px 24px 20px;
  max-width:740px;margin:0 auto;
  position:relative;
}
.library-header::after{
  content:'';
  position:absolute;bottom:0;left:24px;right:24px;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);
}
.library-title{
  font-family:'Syne',sans-serif;
  font-size:2rem;font-weight:800;
  margin-bottom:6px;
  letter-spacing:0.02em;
  text-transform:uppercase;
  background:linear-gradient(90deg,var(--text) 40%,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.library-sub{font-size:0.8rem;color:var(--muted);line-height:1.5;letter-spacing:0.01em;}

.filter-row{
  display:flex;gap:8px;
  padding:20px 24px;
  max-width:740px;margin:0 auto;
  flex-wrap:wrap;
}
.filter-btn{
  padding:6px 16px;
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--muted);
  border-radius:20px;
  font-family:'JetBrains Mono',monospace;
  font-size:0.7rem;font-weight:500;
  cursor:pointer;
  transition:all 0.2s ease;
  letter-spacing:0.02em;
}
.filter-btn.active{
  background:var(--accent-dim);
  border-color:var(--accent);
  color:var(--accent);
  box-shadow:0 0 10px rgba(0,229,255,0.15);
}
.filter-btn:hover:not(.active){border-color:var(--border-hover);color:var(--text-secondary);}

.article-grid{
  max-width:740px;margin:0 auto;
  padding:0 24px 100px;
  display:grid;gap:10px;
}

.article-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px 20px;
  cursor:pointer;
  display:flex;align-items:center;gap:16px;
  transition:all 0.22s ease;
  position:relative;overflow:hidden;
}
.article-card::before{
  content:'';position:absolute;
  left:0;top:0;bottom:0;width:2px;
  background:linear-gradient(180deg,var(--accent),var(--accent2));
  opacity:0;transition:opacity 0.22s;
  box-shadow:0 0 12px var(--accent-glow);
}
.article-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,229,255,0.04),transparent 60%);
  opacity:0;transition:opacity 0.22s;
}
.article-card:hover{
  border-color:rgba(0,229,255,0.25);
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(0,229,255,0.08),0 0 24px rgba(0,229,255,0.06);
}
.article-card:hover::before{opacity:1;}
.article-card:hover::after{opacity:1;}

.card-icon{
  width:46px;height:46px;
  background:linear-gradient(135deg,var(--surface2),var(--surface3));
  border-radius:12px;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;flex-shrink:0;
}

.card-body{flex:1;min-width:0;}
.card-title{
  font-family:'Syne',sans-serif;
  font-size:0.97rem;font-weight:600;
  margin-bottom:7px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--text);
}
.card-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

.level-pill{
  font-family:'JetBrains Mono',monospace;
  font-size:0.62rem;padding:2px 9px;
  border-radius:20px;font-weight:500;
  letter-spacing:0.05em;
}
.level-A1{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,255,179,0.2);}
.level-A2{background:var(--accent2-dim);color:var(--accent2);border:1px solid rgba(200,255,0,0.2);}
.level-B1{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(244,185,66,0.2);}

.card-topic{font-size:0.73rem;color:var(--muted);}
.card-arrow{color:var(--muted);font-size:1rem;flex-shrink:0;transition:color 0.2s,transform 0.2s;}
.article-card:hover .card-arrow{color:var(--accent);transform:translateX(3px);}
.card-read-badge{
  position:absolute;top:10px;right:12px;
  font-size:0.58rem;color:var(--green);
  font-family:'JetBrains Mono',monospace;
  background:var(--green-dim);
  padding:2px 7px;border-radius:10px;
  border:1px solid rgba(0,255,179,0.2);
}

/* ── READER ── */
.reader-topbar{
  display:flex;align-items:center;gap:12px;
  padding:14px 24px;
  border-bottom:1px solid var(--border);
  position:sticky;top:60px;z-index:90;
  background:rgba(8,11,16,0.92);
  backdrop-filter:blur(16px);
}
.back-btn{
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text-secondary);
  border-radius:var(--radius-sm);
  padding:6px 13px;font-size:0.8rem;
  cursor:pointer;
  transition:all 0.2s;
  font-family:'Space Grotesk',sans-serif;
  display:flex;align-items:center;gap:5px;
}
.back-btn:hover{background:var(--surface3);border-color:var(--border-hover);color:var(--text);}
.reader-title-bar{
  font-family:'Space Grotesk',sans-serif;
  font-size:0.85rem;color:var(--muted);
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.reader-progress{
  font-family:'JetBrains Mono',monospace;
  font-size:0.68rem;color:var(--accent);
  background:var(--accent-dim);
  padding:3px 10px;border-radius:10px;
  border:1px solid rgba(0,229,255,0.2);
  flex-shrink:0;
}

.reader-body{max-width:660px;margin:0 auto;padding:36px 24px 80px;}
.reader-meta{display:flex;gap:8px;margin-bottom:20px;align-items:center;}
.reader-main-title{
  font-family:'Syne',sans-serif;
  font-size:1.95rem;font-weight:800;
  line-height:1.2;margin-bottom:32px;
  letter-spacing:0.01em;
  text-transform:uppercase;
  color:var(--text);
}
.reading-text{font-size:1.05rem;line-height:2;color:var(--text-secondary);}

/* WORD STYLES */
.w{cursor:pointer;border-radius:3px;transition:all 0.15s;padding:0 2px;margin:0 -1px;}
.w:hover{background:rgba(0,229,255,0.12);color:var(--accent);}
.w.seen{color:var(--accent);}
.w.in-vocab{border-bottom:2px solid rgba(0,255,179,0.5);color:var(--green);}

/* POPUP */
.word-popup{
  position:fixed;z-index:500;
  background:rgba(11,14,26,0.99);
  border:1px solid rgba(0,229,255,0.18);
  border-radius:16px;
  padding:0;max-width:270px;min-width:210px;
  box-shadow:0 24px 64px rgba(0,0,0,0.9),0 0 0 1px rgba(0,229,255,0.08),0 0 40px rgba(0,229,255,0.06);
  backdrop-filter:blur(24px);
  opacity:0;pointer-events:none;
  transition:opacity 0.16s,transform 0.16s;
  transform:translateY(-10px) scale(0.95);
}
.word-popup.show{opacity:1;pointer-events:all;transform:translateY(0) scale(1);}
.popup-inner{padding:16px 18px;}
.popup-word{
  font-family:'Syne',sans-serif;
  font-size:1.25rem;color:var(--accent);font-weight:700;margin-bottom:2px;
}
.popup-type{
  font-family:'JetBrains Mono',monospace;
  font-size:0.62rem;color:var(--muted);margin-bottom:10px;
  text-transform:uppercase;letter-spacing:0.06em;
}
.popup-mn{font-size:0.95rem;color:var(--text);margin-bottom:8px;line-height:1.5;}
.popup-ex{
  font-size:0.75rem;color:var(--muted);font-style:italic;
  padding-top:10px;border-top:1px solid var(--border);margin-bottom:10px;
  line-height:1.5;
}
.popup-add-btn{
  width:100%;padding:9px;
  background:var(--accent-dim);
  border:1px solid rgba(0,229,255,0.25);
  color:var(--accent);
  border-radius:var(--radius-sm);
  font-family:'Space Grotesk',sans-serif;
  font-size:0.78rem;font-weight:600;
  cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.popup-add-btn:hover{background:rgba(0,229,255,0.18);border-color:rgba(0,229,255,0.4);}
.popup-add-btn.added{
  background:var(--green-dim);border-color:rgba(0,255,179,0.3);color:var(--green);
}
.popup-footer{padding:10px 16px;border-top:1px solid var(--border);}

/* VOCAB BAR */
.vocab-bar{
  margin-top:36px;padding:22px;
  background:var(--surface);
  border-radius:var(--radius);
  border:1px solid var(--border);
}
.vocab-bar-title{
  font-family:'JetBrains Mono',monospace;
  font-size:0.65rem;color:var(--accent);
  letter-spacing:0.1em;text-transform:uppercase;
  margin-bottom:14px;
  display:flex;align-items:center;gap:6px;
}
.vocab-chips{display:flex;flex-wrap:wrap;gap:8px;}
.vocab-chip{
  padding:7px 13px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:20px;cursor:pointer;
  transition:all 0.18s;
}
.vocab-chip:hover{border-color:var(--accent);background:var(--accent-dim);transform:translateY(-1px);}
.chip-en{font-size:0.83rem;color:var(--text);font-weight:500;}
.chip-mn{font-size:0.7rem;color:var(--muted);margin-top:1px;}

.reader-actions{display:flex;gap:10px;margin-top:36px;}
.btn-main{
  flex:1;padding:14px;
  background:linear-gradient(90deg,#00e5ff,#c8ff00);
  color:#060810;border:none;border-radius:var(--radius-sm);
  font-family:'Space Grotesk',sans-serif;
  font-size:0.88rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;
  cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
  box-shadow:0 4px 16px rgba(0,229,255,0.25);
}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,229,255,0.35);}
.btn-ghost{
  padding:14px 20px;
  background:var(--surface2);
  color:var(--text-secondary);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  font-family:'Space Grotesk',sans-serif;
  font-size:0.9rem;cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;gap:6px;
}
.btn-ghost:hover{background:var(--surface3);border-color:var(--border-hover);color:var(--text);}

/* ── VOCAB SCREEN ── */
.vocab-screen-body{max-width:740px;margin:0 auto;padding:28px 24px 100px;}
.vocab-screen-header{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;
}
.vocab-screen-title{
  font-family:'Syne',sans-serif;
  font-size:1.5rem;font-weight:800;
  display:flex;align-items:center;gap:10px;
  letter-spacing:-0.02em;
}
.vocab-screen-sub{font-size:0.8rem;color:var(--muted);margin-bottom:24px;line-height:1.5;}

.vocab-cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:12px;
}
.vc{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px 16px;cursor:pointer;
  transition:all 0.22s;position:relative;
  overflow:hidden;
}
.vc::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  opacity:0;transition:opacity 0.2s;
}
.vc:hover{
  border-color:var(--border-hover);
  transform:translateY(-3px);
  box-shadow:0 12px 28px rgba(0,0,0,0.35);
}
.vc:hover::before{opacity:1;}
.vc-en{
  font-family:'Syne',sans-serif;
  font-size:1.02rem;font-weight:600;color:var(--text);margin-bottom:6px;
}
.vc-mn{font-size:0.8rem;color:var(--muted);line-height:1.4;}
.vc-type{
  font-family:'JetBrains Mono',monospace;font-size:0.6rem;
  color:var(--accent);margin-bottom:7px;
  text-transform:uppercase;letter-spacing:0.06em;
}
.vc-del{
  position:absolute;top:9px;right:10px;
  background:none;border:none;
  color:var(--muted);font-size:0.85rem;
  cursor:pointer;opacity:0;transition:all 0.2s;
  width:22px;height:22px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
}
.vc:hover .vc-del{opacity:1;}
.vc-del:hover{color:var(--red);background:var(--red-dim);}

/* STUDY MODE */
.study-btn{
  padding:9px 18px;
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text-secondary);
  border-radius:var(--radius-sm);
  font-family:'Space Grotesk',sans-serif;
  font-size:0.82rem;font-weight:500;
  cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;gap:6px;
}
.study-btn:hover{
  background:var(--accent-dim);border-color:var(--accent);color:var(--accent);
  box-shadow:0 0 12px rgba(0,229,255,0.15);
}
.study-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(3,5,10,0.97);
  z-index:200;align-items:center;justify-content:center;
  backdrop-filter:blur(16px);
}
.study-overlay.show{display:flex;}
.study-card-wrap{max-width:400px;width:90%;text-align:center;}
.study-close{
  position:absolute;top:22px;right:22px;
  background:var(--surface2);border:1px solid rgba(0,229,255,0.12);
  color:var(--muted);border-radius:var(--radius-sm);
  padding:8px 16px;font-size:0.8rem;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;
  transition:all 0.2s;display:flex;align-items:center;gap:5px;
}
.study-close:hover{background:var(--surface3);color:var(--accent);border-color:rgba(0,229,255,0.3);}
.study-card{
  background:linear-gradient(135deg,var(--surface),var(--surface2));
  border:1px solid rgba(0,229,255,0.15);
  border-radius:20px;padding:52px 36px;
  margin-bottom:20px;min-height:220px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.3s;
  box-shadow:0 28px 80px rgba(0,0,0,0.6),0 0 60px rgba(0,229,255,0.04);
  position:relative;overflow:hidden;
}
.study-card::before{
  content:'';position:absolute;top:-50%;left:-50%;
  width:200%;height:200%;
  background:conic-gradient(from 0deg at 50% 50%,transparent 0deg,rgba(0,229,255,0.05) 60deg,rgba(200,255,0,0.03) 90deg,transparent 120deg);
  animation:rotate 10s linear infinite;
}
.study-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(0,229,255,0.03) 0%,transparent 50%);
  pointer-events:none;
}
@keyframes rotate{to{transform:rotate(360deg);}}
.study-card:hover{transform:translateY(-4px);box-shadow:0 36px 90px rgba(0,0,0,0.7),0 0 80px rgba(0,229,255,0.07);}
.study-en{
  font-family:'Syne',sans-serif;
  font-size:2.4rem;color:var(--text);font-weight:800;
  margin-bottom:8px;letter-spacing:0.02em;text-transform:uppercase;
  position:relative;
}
.study-type{
  font-family:'JetBrains Mono',monospace;font-size:0.68rem;
  color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;
  position:relative;
}
.study-mn{font-size:1.15rem;color:var(--accent);font-weight:600;margin-top:20px;display:none;position:relative;text-shadow:0 0 20px rgba(0,229,255,0.4);}
.study-mn.show{display:block;}
.study-hint{font-size:0.73rem;color:var(--muted);margin-top:14px;position:relative;}
.study-nav{display:flex;gap:12px;justify-content:center;}
.study-nav-btn{
  padding:11px 26px;border-radius:var(--radius-sm);
  font-family:'Space Grotesk',sans-serif;font-size:0.85rem;font-weight:700;
  cursor:pointer;border:none;transition:all 0.2s;
  display:flex;align-items:center;gap:6px;letter-spacing:0.04em;text-transform:uppercase;
}
.s-next{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#060810;box-shadow:0 4px 18px rgba(0,229,255,0.28);
}
.s-next:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,229,255,0.42);}
.s-prev{background:var(--surface2);color:var(--text-secondary);border:1px solid rgba(0,229,255,0.1);}
.s-prev:hover{background:var(--surface3);color:var(--text);border-color:rgba(0,229,255,0.25);}
.study-prog{
  font-family:'JetBrains Mono',monospace;font-size:0.7rem;
  color:var(--accent);text-align:center;margin-bottom:18px;letter-spacing:0.05em;
}

/* ── QUIZ ── */
.quiz-body{max-width:660px;margin:0 auto;padding:28px 24px 100px;}
.quiz-list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
.quiz-list-title{
  font-family:'Syne',sans-serif;
  font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;
}
.quiz-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 20px;
  margin-bottom:10px;display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:all 0.22s;position:relative;overflow:hidden;
}
.quiz-item::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:linear-gradient(180deg,var(--accent2),rgba(200,255,0,0.3));
  opacity:0;transition:opacity 0.2s;
}
.quiz-item:hover{border-color:var(--border-hover);transform:translateX(2px);}
.quiz-item:hover::before{opacity:1;}
.quiz-item-body{flex:1;}
.quiz-item-title{
  font-family:'Syne',sans-serif;
  font-size:0.95rem;font-weight:600;margin-bottom:4px;
}
.quiz-item-meta{font-size:0.76rem;color:var(--muted);}
.quiz-item-score{
  font-family:'JetBrains Mono',monospace;font-size:0.78rem;
  color:var(--green);font-weight:500;
  background:var(--green-dim);padding:3px 10px;border-radius:10px;
  border:1px solid rgba(0,255,179,0.2);
}
.quiz-take{display:none;}
.quiz-take.active{display:block;}
.take-header{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
.take-title{
  font-family:'Syne',sans-serif;
  font-size:1.1rem;font-weight:700;flex:1;letter-spacing:-0.01em;
}
.take-prog{
  font-family:'JetBrains Mono',monospace;font-size:0.75rem;
  color:var(--muted);
}
.prog-bar{
  height:3px;
  background:var(--surface2);
  border-radius:99px;margin-bottom:28px;overflow:hidden;
}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:99px;transition:width 0.5s ease;
}
.q-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:28px 26px;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
}
.q-label{
  font-family:'JetBrains Mono',monospace;font-size:0.62rem;
  color:var(--accent2);letter-spacing:0.12em;
  text-transform:uppercase;margin-bottom:12px;
}
.q-text{
  font-family:'Syne',sans-serif;
  font-size:1.08rem;line-height:1.5;margin-bottom:22px;
}
.q-opts{display:flex;flex-direction:column;gap:10px;}
.q-opt{
  padding:13px 16px;
  background:var(--surface2);color:var(--text);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  font-size:0.9rem;cursor:pointer;text-align:left;
  transition:all 0.15s;
  font-family:'Space Grotesk',sans-serif;
}
.q-opt:hover:not(:disabled){
  border-color:var(--accent2);
  background:var(--accent2-dim);
  transform:translateX(3px);
  color:var(--accent2);
}
.q-opt.correct{background:var(--green-dim);border-color:var(--green);color:var(--green);}
.q-opt.wrong{background:var(--red-dim);border-color:var(--red);color:var(--red);}
.q-opt:disabled{cursor:default;}
.q-fb{
  margin-top:16px;padding:13px 16px;
  border-radius:var(--radius-sm);
  font-size:0.87rem;line-height:1.5;display:none;
}
.q-fb.show{display:block;}
.q-fb.ok{background:var(--green-dim);border-left:3px solid var(--green);color:#7de8a8;}
.q-fb.bad{background:var(--red-dim);border-left:3px solid var(--red);color:#e08080;}
.result-box{
  text-align:center;padding:44px 28px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:0 12px 40px rgba(0,0,0,0.4);
}
.result-big{
  font-family:'Syne',sans-serif;
  font-size:4.8rem;color:var(--text);line-height:1;
  letter-spacing:-0.03em;
}
.result-big span{
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0a0a;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.result-sub{color:var(--muted);font-size:1rem;margin:8px 0 28px;}
.result-detail{
  background:var(--surface2);border-radius:var(--radius-sm);
  padding:18px;margin-bottom:24px;text-align:left;
}
.result-detail-title{
  font-family:'JetBrains Mono',monospace;font-size:0.62rem;
  color:var(--muted);letter-spacing:0.1em;margin-bottom:10px;text-transform:uppercase;
}

/* MANUAL QUIZ FORM */
.add-quiz-btn{
  padding:9px 18px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#060810;border:none;border-radius:var(--radius-sm);
  font-family:'Space Grotesk',sans-serif;font-size:0.78rem;font-weight:700;
  letter-spacing:0.05em;text-transform:uppercase;
  cursor:pointer;transition:all 0.2s;
  box-shadow:0 2px 14px rgba(0,229,255,0.22);
}
.add-quiz-btn:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,229,255,0.35);}
.quiz-form{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:26px;margin-bottom:20px;display:none;
}
.quiz-form.open{display:block;}
.form-title{
  font-family:'Syne',sans-serif;
  font-size:1.05rem;font-weight:700;margin-bottom:20px;
  display:flex;align-items:center;gap:8px;
}
.form-field{margin-bottom:16px;}
.form-label{
  font-family:'JetBrains Mono',monospace;font-size:0.65rem;
  color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;
  display:block;margin-bottom:7px;
}
.form-input{
  width:100%;
  background:var(--bg);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:var(--radius-sm);padding:10px 14px;
  font-family:'Space Grotesk',sans-serif;font-size:0.88rem;
  outline:none;transition:all 0.2s;
}
.form-input:focus{border-color:rgba(0,229,255,0.4);box-shadow:0 0 0 3px rgba(0,229,255,0.06);}
.form-input::placeholder{color:var(--muted);}
select.form-input option{background:var(--surface2);}
.q-builder{
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:18px;margin-bottom:10px;position:relative;
}
.q-num{
  font-family:'JetBrains Mono',monospace;font-size:0.68rem;
  color:var(--accent);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em;
}
.q-delete{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;transition:color 0.2s;}
.q-delete:hover{color:var(--red);}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.opt-row{display:flex;gap:6px;align-items:center;}
.opt-radio{accent-color:var(--green);cursor:pointer;flex-shrink:0;}
.opt-input{
  flex:1;background:var(--surface);border:1px solid var(--border);
  color:var(--text);border-radius:6px;padding:7px 10px;
  font-size:0.82rem;font-family:'Space Grotesk',sans-serif;outline:none;transition:all 0.2s;
}
.opt-input:focus{border-color:rgba(0,229,255,0.4);}
.add-q-btn{
  width:100%;padding:10px;
  background:transparent;
  border:1px dashed rgba(255,255,255,0.1);
  color:var(--muted);border-radius:var(--radius-sm);
  font-family:'Space Grotesk',sans-serif;font-size:0.83rem;
  cursor:pointer;transition:all 0.2s;margin-top:8px;
}
.add-q-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.form-actions{display:flex;gap:10px;margin-top:18px;}
.btn-save{
  flex:1;padding:12px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#060810;border:none;border-radius:var(--radius-sm);
  font-weight:700;font-size:0.85rem;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;
  letter-spacing:0.04em;text-transform:uppercase;
  transition:all 0.2s;
}
.btn-save:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,229,255,0.28);}
.btn-cancel{
  padding:12px 20px;background:transparent;
  color:var(--muted);border:1px solid var(--border);
  border-radius:var(--radius-sm);font-size:0.9rem;
  cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all 0.2s;
}
.btn-cancel:hover{background:var(--surface2);color:var(--text);}

/* PHRASAL VERB */
.popup-phrasal{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.phrasal-title{
  font-family:'JetBrains Mono',monospace;font-size:0.6rem;
  color:var(--accent2);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;
}
.phrasal-item{display:flex;gap:8px;align-items:baseline;margin-bottom:4px;}
.phrasal-phrase{font-size:0.82rem;color:var(--accent2);font-weight:600;}
.phrasal-mn{font-size:0.8rem;color:var(--muted);}

/* ── GRAMMAR ── */
.grammar-body{max-width:740px;margin:0 auto;padding:28px 24px 100px;}
.grammar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
.grammar-title{
  font-family:'Syne',sans-serif;
  font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;
  display:flex;align-items:center;gap:10px;
}
.grammar-form{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:26px;margin-bottom:24px;display:none;
}
.grammar-form.open{display:block;}
.grammar-form textarea.form-input{resize:vertical;min-height:96px;font-family:'Space Grotesk',sans-serif;line-height:1.6;}
.g-example-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.g-example-row input{flex:1;}
.g-example-del{
  background:none;border:none;color:var(--muted);
  font-size:0.9rem;cursor:pointer;padding:5px 7px;
  transition:all 0.2s;flex-shrink:0;border-radius:6px;
}
.g-example-del:hover{color:var(--red);background:var(--red-dim);}
.grammar-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:10px;
  overflow:hidden;transition:all 0.22s;
}
.grammar-card:hover{border-color:var(--border-hover);}
.grammar-card-top{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:17px 20px;cursor:pointer;user-select:none;
  transition:background 0.15s;
}
.grammar-card-top:hover{background:rgba(255,255,255,0.02);}
.grammar-card-name{
  font-family:'Syne',sans-serif;
  font-size:1rem;font-weight:700;flex:1;
}
.grammar-card-arrow{
  font-size:0.85rem;color:var(--muted);
  transition:transform 0.25s;flex-shrink:0;
}
.grammar-card.open .grammar-card-arrow{transform:rotate(90deg);}
.g-edit-btn,.g-del-btn{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:5px 11px;
  font-size:0.73rem;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;
  transition:all 0.2s;color:var(--muted);
  display:flex;align-items:center;gap:4px;
}
.g-edit-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.g-del-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-dim);}
.grammar-card-body{
  display:none;padding:0 20px 20px;
  border-top:1px solid var(--border);
}
.grammar-card.open .grammar-card-body{display:block;}
.grammar-card-desc{
  font-size:0.9rem;color:var(--text-secondary);
  line-height:1.75;margin-bottom:14px;
  white-space:pre-wrap;padding-top:16px;
}
.grammar-examples{display:flex;flex-direction:column;gap:7px;}
.grammar-example{
  background:var(--surface2);
  border-left:3px solid var(--accent);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  padding:9px 14px;font-size:0.87rem;
  color:var(--muted);font-style:italic;
}
.grammar-empty{text-align:center;padding:70px 20px;color:var(--muted);}
.grammar-empty-icon{font-size:2.8rem;display:block;margin-bottom:14px;opacity:0.3;}

/* CUSTOM WORD MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(4,6,10,0.88);z-index:300;
  align-items:center;justify-content:center;
  backdrop-filter:blur(10px);
}
.modal-overlay.show{display:flex;}
.modal-box{
  background:var(--surface);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:20px;padding:30px 26px;
  width:90%;max-width:370px;
  box-shadow:0 28px 70px rgba(0,0,0,0.7),0 0 0 1px rgba(0,229,255,0.07);
}
.modal-title{
  font-family:'Syne',sans-serif;
  font-size:1.12rem;font-weight:700;margin-bottom:20px;
  display:flex;align-items:center;gap:8px;
}
.modal-field{margin-bottom:15px;}
.modal-actions{display:flex;gap:10px;margin-top:22px;}

/* EMPTY */
.empty{text-align:center;padding:70px 20px;color:var(--muted);}
.empty-icon{font-size:2.8rem;display:block;margin-bottom:14px;opacity:0.3;}

/* TOAST */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(70px);
  background:rgba(20,25,36,0.98);
  color:var(--text);
  border:1px solid rgba(0,229,255,0.2);
  border-radius:12px;padding:11px 22px;
  font-size:0.83rem;z-index:9999;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space:nowrap;
  box-shadow:0 12px 32px rgba(0,0,0,0.5),0 0 20px rgba(0,229,255,0.1);
  backdrop-filter:blur(12px);
  font-weight:500;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* RESPONSIVE */
@media(max-width:480px){
  .opts-grid{grid-template-columns:1fr;}
  .reader-main-title{font-size:1.5rem;}
  .result-big{font-size:3.6rem;}
  .vocab-cards-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));}
  header{padding:0 16px;}
  .nav-tab{padding:6px 10px;font-size:0.72rem;}
  .library-header,.filter-row,.article-grid{padding-left:16px;padding-right:16px;}
}

/* SCROLL */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.18);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(0,229,255,0.35);}

/* SELECTION */
::selection{background:rgba(0,229,255,0.18);color:var(--text);}

/* ANIMATIONS */
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes pulseGlow{
  0%,100%{box-shadow:0 0 12px rgba(0,229,255,0.2);}
  50%{box-shadow:0 0 28px rgba(0,229,255,0.45),0 0 60px rgba(0,229,255,0.12);}
}
@keyframes scanline{
  0%{transform:translateY(-100%);}
  100%{transform:translateY(100vh);}
}
@keyframes slideInLeft{
  from{opacity:0;transform:translateX(-14px);}
  to{opacity:1;transform:translateX(0);}
}

/* Scanline effect on header */
header::after{
  content:'';
  position:absolute;
  left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,229,255,0.4),rgba(200,255,0,0.2),transparent);
  bottom:0;
  pointer-events:none;
}

.screen.active .article-card,.screen.active .vc,.screen.active .quiz-item,.screen.active .grammar-card{
  animation:fadeInUp 0.45s cubic-bezier(0.22,1,0.36,1) both;
}
.screen.active .article-card:nth-child(1){animation-delay:0.00s;}
.screen.active .article-card:nth-child(2){animation-delay:0.06s;}
.screen.active .article-card:nth-child(3){animation-delay:0.12s;}
.screen.active .article-card:nth-child(4){animation-delay:0.18s;}
.screen.active .article-card:nth-child(5){animation-delay:0.24s;}
.screen.active .article-card:nth-child(6){animation-delay:0.30s;}

/* Electric nav active indicator */
.nav-tab.active{position:relative;}
.nav-tab.active::before{
  content:'';
  position:absolute;
  bottom:3px;left:50%;
  transform:translateX(-50%);
  width:20px;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:2px;
  box-shadow:0 0 8px var(--accent-glow);
}

/* Card icon glow on hover */
.article-card:hover .card-icon{
  border-color:rgba(0,229,255,0.25);
  box-shadow:0 0 16px rgba(0,229,255,0.12);
}

/* Word popup entrance */
.word-popup.show{
  animation:fadeInUp 0.18s cubic-bezier(0.22,1,0.36,1) both;
}

/* Filter btn active glow */
.filter-btn.active{
  animation:pulseGlow 2.5s ease-in-out infinite;
}

/* Energetic typography */
.filter-btn{font-size:0.62rem;letter-spacing:0.09em;font-weight:600;}
.level-pill{font-size:0.57rem;letter-spacing:0.1em;font-weight:700;}
.card-title{letter-spacing:0.01em;}
.library-title{letter-spacing:0.04em;}



</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- WORD POPUP -->
<div class="word-popup" id="popup">
  <div class="popup-inner">
    <div class="popup-word" id="p-word"></div>
    <div class="popup-type" id="p-type"></div>
    <div class="popup-mn" id="p-mn"></div>
    <div class="popup-ex" id="p-ex"></div>
    <div class="popup-phrasal" id="p-phrasal" style="display:none;">
      <div class="phrasal-title">Хэлц үгс</div>
      <div id="p-phrasal-list"></div>
    </div>
  </div>
  <div class="popup-footer">
    <button class="popup-add-btn" id="p-add-btn" onclick="addFromPopup()">
      <span id="p-add-icon">+</span>
      <span id="p-add-text">Үгийн санд нэмэх</span>
    </button>
  </div>
</div>

<!-- CUSTOM WORD MODAL -->
<div class="modal-overlay" id="customWordModal">
  <div class="modal-box">
    <div class="modal-title"><span class="ic ic-sm"><i data-lucide="edit-3"></i></span> Үг нэмэх</div>
    <div class="modal-field">
      <label class="form-label">Англи үг</label>
      <input class="form-input" id="cw-en" placeholder="Жишээ: beautiful">
    </div>
    <div class="modal-field">
      <label class="form-label">Монгол орчуулга</label>
      <input class="form-input" id="cw-mn" placeholder="Жишээ: үзэсгэлэнтэй">
    </div>
    <div class="modal-field">
      <label class="form-label">Үгийн төрөл (заавал биш)</label>
      <select class="form-input" id="cw-type">
        <option value="">—</option>
        <option value="noun">noun — нэр үг</option>
        <option value="verb">verb — үйл үг</option>
        <option value="adj">adj — тэмдэг нэр</option>
        <option value="adv">adv — дайвар үг</option>
        <option value="phrase">phrase — хэлц үг</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveCustomWord()">Нэмэх</button>
      <button class="btn-cancel" onclick="closeCustomWordModal()">Цуцлах</button>
    </div>
  </div>
</div>

<!-- STUDY OVERLAY -->
<div class="study-overlay" id="studyOverlay">
  <button class="study-close" onclick="closeStudy()"><span class="ic ic-sm"><i data-lucide="x"></i></span> Хаах</button>
  <div class="study-card-wrap">
    <div class="study-prog" id="studyProg"></div>
    <div class="study-card" id="studyCard" onclick="revealStudy()">
      <div class="study-en" id="studyEn"></div>

   text:'Young people play a very important role in society. The youth of today will become the leaders, workers, and thinkers of tomorrow. Many young people face tough challenges growing up, such as pressure at school, social media, and finding their place in the world. Some young people struggle with their identity and wonder who they really are. It is important for youth to have good role models and support from their families and communities. Young people also have a powerful voice and can bring about positive change. Many young activists around the world are speaking out about important issues like climate change and equal rights. The energy and talent of youth is one of society\'s greatest treasures.',

  {id:'a4r',level:'A2',topic:'Science & Technology',icon:'🔭',
   title:'The Telescope and Space Exploration',
   text:'The telescope is one of the most important tools in the history of science. It allows us to see objects that are very far away, such as stars, planets, and galaxies. The first telescopes were invented in the 1600s and used simple glass lenses. Today, scientists use incredibly powerful telescopes to study the universe. Some telescopes are placed in space, above the atmosphere, to get a clearer view of the stars. Space exploration has helped us learn a great deal about our solar system and beyond. Scientists have sent spacecraft to visit other planets, and robots have landed on Mars. The search for life in the universe continues, and with better technology, we may one day find the answer.',

  {id:'a4s',level:'A2',topic:'Body & Health',icon:'🏥',
   title:'Surgery and Modern Medicine',
   text:'Modern medicine has made it possible to treat illnesses and injuries that were once impossible to cure. Surgery is a medical procedure where doctors operate on the body to fix a problem. For example, surgeons can remove a damaged organ, repair a broken bone, or treat a serious wound. Before surgery, patients are given medicine so they do not feel pain. After surgery, the body needs time to heal. Today, many operations can be done with very small cuts, thanks to new technology. This means patients recover faster and have fewer symptoms after the operation. Doctors and nurses work as a team during surgery to make sure everything goes smoothly. Modern surgery has saved millions of lives and continues to improve every year.',

  {id:'a4t',level:'A2',topic:'Daily Life',icon:'🎒',
   title:'School Uniforms: Yes or No?',
   text:'Many schools around the world require students to wear a uniform. A school uniform is a set of clothes that all students must wear. Supporters of uniforms say they make schools safer and more equal, because students cannot be judged by their clothes. Uniforms also make mornings easier, since students do not have to decide what to wear. However, some people argue that uniforms take away students\' freedom to express themselves. They say that clothing is an important part of personal identity and that being unique is something to celebrate. Students in some countries have the right to choose what they wear to school. Whether a school has a uniform or not, the most important thing is that all students feel safe, respected, and ready to learn.',

// ==================== AUTO QUIZ GENERATION ====================
function shuffleQuestion(q){
  // Randomly reorder opts and update ans index
  const correct=q.opts[q.ans];
  const shuffled=[...q.opts].sort(()=>Math.random()-0.5);
  return {...q, opts:shuffled, ans:shuffled.indexOf(correct)};
}

function generateQuizFromArticle(article){
  const qs=[];
  const vocabWords=article.vocab.filter(w=>D[w]);

  const compQs=generateComprehensionQuestions(article);
  qs.push(...compQs);

  const vocabQs=generateVocabQuestions(vocabWords,6-qs.length);
  qs.push(...vocabQs);

  const final=qs.slice(0,6).map(shuffleQuestion);
  // Shuffle question order
  for(let i=final.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [final[i],final[j]]=[final[j],final[i]];
  }
  return final;
}

function generateVocabQuestions(vocabWords,count){
  const qs=[];
  const available=vocabWords.filter(w=>D[w]);
  if(!available.length)return qs;
  const shuffled=[...available].sort(()=>Math.random()-0.5);
  const picked=shuffled.slice(0,Math.min(count,shuffled.length,3));

  for(const word of picked){
    const correct=D[word].mn;
    // Get 3 distractors
    const allMns=Object.values(D).map(v=>v.mn).filter(m=>m!==correct);
    const distractors=allMns.sort(()=>Math.random()-0.5).slice(0,3);
    const opts=[correct,...distractors].sort(()=>Math.random()-0.5);
    const ans=opts.indexOf(correct);
    qs.push({q:`"${word}" гэдэг үгийн Монгол орчуулга нь юу вэ?`,opts,ans});
  }
  return qs;
}

function getTopicIcon(topic){
  const t=(topic||'').toLowerCase();
  if(t.includes('animal'))return lucide('paw');
  if(t.includes('weather')||t.includes('season'))return lucide('cloud');
  if(t.includes('food'))return lucide('apple');
  if(t.includes('color'))return lucide('sun');
  if(t.includes('nature')||t.includes('ecology')||t.includes('environment'))return lucide('leaf');
  if(t.includes('tech')||t.includes('phone')||t.includes('ai')||t.includes('robot'))return lucide('cpu');
  if(t.includes('space'))return lucide('telescope');
  if(t.includes('science'))return lucide('flask');
  if(t.includes('health')||t.includes('body'))return lucide('activity');
  if(t.includes('history')||t.includes('ancient'))return lucide('landmark');
  if(t.includes('transport'))return lucide('zap');
  if(t.includes('culture')||t.includes('festival'))return lucide('music');
  if(t.includes('psychology')||t.includes('dream'))return lucide('brain');
  if(t.includes('ocean')||t.includes('water'))return lucide('waves');
  if(t.includes('crime')||t.includes('justice'))return lucide('scale');
  if(t.includes('war'))return lucide('sword');
  if(t.includes('daily')||t.includes('life'))return lucide('sun');
  if(t.includes('society')||t.includes('people'))return lucide('users');
  if(t.includes('education')||t.includes('career'))return lucide('graduation-cap');
  return lucide('file-text');
}

// ==================== READER ====================
function openReader(id){
  const art=ARTICLES.find(a=>a.id===id);
  if(!art)return;
  currentArticle=art;
  // Note: ST.read[id] is set only after completing a quiz, not here
  document.getElementById('readerTitleBar').textContent=art.title;
  document.getElementById('readerMeta').innerHTML=`
    <span class="level-pill level-${art.level}">${art.level}</span>
    <span style="font-size:0.8rem;color:var(--muted);">${art.topic}</span>`;
  document.getElementById('readerTitle').textContent=art.title;
  const wc=art.text.split(/\s+/).length;
  document.getElementById('readerProgress').textContent=`~${wc} үг`;

  const tokens=art.text.split(/(\s+)/);
  let html='';
  tokens.forEach(tok=>{
    if(/^\s+$/.test(tok)){html+=tok;return;}
    const match=tok.match(/^([^a-zA-Z']*)([a-zA-Z']+)([^a-zA-Z']*)$/);
    if(match){
      const pre=match[1],word=match[2],post=match[3];
      const clean=word.toLowerCase();
      const inVocab=ST.vocab.some(v=>v.en===clean);
      const cls='w'+(inVocab?' in-vocab':'');
      html+=pre+`<span class="${cls}" data-w="${clean}">${word}</span>`+post;
    } else {
      html+=tok;
    }
  });

  document.getElementById('readerText').innerHTML=html;

  document.querySelectorAll('#readerText .w').forEach(el=>{
    el.addEventListener('click',e=>{e.stopPropagation();showWordPopup(e,el);});
  });

  const chips=art.vocab.map(w=>{
    const d=D[w];if(!d)return'';
    return`<div class="vocab-chip" data-w="${w}">
      <div class="chip-en">${w}</div>
      <div class="chip-mn">${d.mn}</div>
    </div>`;
  }).join('');
  if(chips){
    document.getElementById('vocabBar').style.display='block';
    document.getElementById('vocabChips').innerHTML=chips;
    document.querySelectorAll('.vocab-chip').forEach(el=>{
      el.addEventListener('click',e=>{
        e.stopPropagation();
        const r=el.getBoundingClientRect();
        showWordPopupAt(r.left,r.bottom+8,el.dataset.w);
      });
    });
  } else {
    document.getElementById('vocabBar').style.display='none';
  }

  switchScreen('reader');
}

function showWordPopup(e,el){
  // Detect phrasal verb: check if next sibling word forms a known phrase
  const word=el.dataset.w;
  let detectedPhrase=null;
  const phrasals=PV[word];
  if(phrasals){
    // Get next word span
    let next=el.nextSibling;
    while(next&&next.nodeType===3){next=next.nextSibling;} // skip text nodes
    if(next&&next.classList&&next.classList.contains('w')){
      const nextW=next.dataset.w;
      const match=phrasals.find(p=>p.phrase===word+' '+nextW);
      if(match)detectedPhrase=match;
    }
  }
  showWordPopupAt(e.clientX+10,e.clientY-10,word,detectedPhrase);
}

function showWordPopupAt(x,y,word,phrasalOverride){
  const d=D[word];
  const p=document.getElementById('popup');
  // If a phrasal verb is detected in context, show that as the main meaning
  if(phrasalOverride){
    document.getElementById('p-word').textContent=phrasalOverride.phrase;
    document.getElementById('p-type').textContent='phrase';
    document.getElementById('p-mn').textContent=phrasalOverride.mn;
    document.getElementById('p-ex').style.display='none';
    document.querySelector('.popup-footer').style.display='block';
    document.getElementById('p-phrasal').style.display='none';
  } else if(d){
    document.getElementById('p-word').textContent=word;
    const typeLabels={'noun':'noun — нэр үг','verb':'verb — үйл үг','adj':'adj — тэмдэг нэр','adv':'adv — дайвар үг','article':'article — тодорхойлогч','phrase':'phrase — хэлц үг','prep':'prep — угтвар үг','conj':'conj — холбоос үг','pron':'pron — төлөөний үг'};
    document.getElementById('p-type').textContent=typeLabels[d.type]||d.type||'';
    document.getElementById('p-mn').textContent=d.mn;
    const ex=document.getElementById('p-ex');
    ex.textContent=d.ex?`"${d.ex}"`:'';
    ex.style.display=d.ex?'block':'none';
    document.querySelector('.popup-footer').style.display='block';
  } else {
    document.getElementById('p-word').textContent=word;
    document.getElementById('p-type').textContent='';
    document.getElementById('p-mn').textContent='Орчуулга байхгүй';
    document.getElementById('p-ex').style.display='none';
    document.querySelector('.popup-footer').style.display='none';
  }
  // Show phrasal verbs list (unless a specific phrase was already detected as main)
  if(!phrasalOverride){
    const phrasals=PV[word];
    const phEl=document.getElementById('p-phrasal');
    const phList=document.getElementById('p-phrasal-list');
    if(phrasals&&phrasals.length){
      phList.innerHTML=phrasals.map(pv=>`<div class="phrasal-item"><span class="phrasal-phrase">${pv.phrase}</span><span class="phrasal-mn">— ${pv.mn}</span></div>`).join('');
      phEl.style.display='block';
    } else {
      phEl.style.display='none';
    }
  }
  // Store the raw word for vocab add (use base word even for phrasal)
  popupWord=word;
  updateAddBtn();
  const px=Math.min(x,window.innerWidth-280);
  const py=y>160?y-160:y+20;
  p.style.left=px+'px';p.style.top=py+'px';
  p.classList.add('show');
}

function updateAddBtn(){
  if(!popupWord)return;
  const btn=document.getElementById('p-add-btn');
  const icon=document.getElementById('p-add-icon');
  const txt=document.getElementById('p-add-text');
  const already=ST.vocab.some(v=>v.en===popupWord);
  if(already){
    btn.classList.add('added');
    icon.innerHTML=lucide('check',14);
    icon.style.color='var(--green)';
    txt.textContent='Үгийн санд байна';
  } else {
    btn.classList.remove('added');
    icon.innerHTML=lucide('plus',14);
    icon.style.color='';
    txt.textContent='Үгийн санд нэмэх';
  }
}

function addFromPopup(){
  if(!popupWord)return;
  const d=D[popupWord];
  const already=ST.vocab.some(v=>v.en===popupWord);
  if(already){
    ST.vocab=ST.vocab.filter(v=>v.en!==popupWord);
    save();updateAddBtn();updateVocabBadge();refreshWordStyles();
    showToast('Үгийн сангаас хасагдлаа');
  } else {
    ST.vocab.push({en:popupWord,mn:d?d.mn:'',type:d?d.type:'',ex:d?d.ex||'':''});
    save();updateAddBtn();updateVocabBadge();refreshWordStyles();
    showToast('Үгийн санд нэмэгдлээ!');
  }
}

function refreshWordStyles(){
  document.querySelectorAll('#readerText .w').forEach(el=>{
    const inV=ST.vocab.some(v=>v.en===el.dataset.w);
    el.classList.toggle('in-vocab',inV);
  });
}

}

function startArticleQuiz(){
  if(!currentArticle){showToast('Эхлээд ном сонгоно уу');return;}
  const questions=generateQuizFromArticle(currentArticle);
  if(!questions||!questions.length){showToast('Энэ номын тест байхгүй байна');return;}
  const quiz={
    id:'auto_'+currentArticle.id,
    title:currentArticle.title+' — Тест',
    level:currentArticle.level,
    questions,
    icon:currentArticle.icon||'📝',
    articleId:currentArticle.id
  };
  // Add or replace existing quiz for this article
  ST.quizzes=ST.quizzes.filter(q=>q.id!==quiz.id);
  ST.quizzes.unshift(quiz);
  save();
  // Switch to quiz tab and start quiz
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.nav-tab')[2].classList.add('active');
  switchScreen('quiz');
  renderQuizList();
  startQuiz(quiz.id);
}

// ==================== MANUAL QUIZ FORM ====================
let qCount=0;
function toggleAddForm(){
  const f=document.getElementById('quizForm');
  f.classList.toggle('open');
  if(f.classList.contains('open')&&!document.getElementById('qBuilderList').children.length){
    qCount=0;document.getElementById('qBuilderList').innerHTML='';addQuestion();
  }
}
function addQuestion(){
  qCount++;
  const id='q'+qCount;
  const div=document.createElement('div');
  div.className='q-builder';div.id=id;
  div.innerHTML=`
    <div class="q-num">АСУУЛТ ${qCount}</div>
    <button class="q-delete" onclick="document.getElementById('${id}').remove()">${lucide('x',14)}</button>
    <input class="form-input" placeholder="Асуулт бичнэ үү..." style="margin-bottom:10px;" data-role="qtext">
    <div style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--muted);margin-bottom:8px;">● Зөв хариултын радио товчийг дарна</div>
    <div class="opts-grid">
      ${[0,1,2,3,4].map(i=>`<div class="opt-row"><input type="radio" name="ans_${id}" class="opt-radio" value="${i}" ${i===0?'checked':''}><input class="opt-input" placeholder="Сонголт ${String.fromCharCode(65+i)}" data-role="opt"></div>`).join('')}
    </div>`;
  document.getElementById('qBuilderList').appendChild(div);
}
function saveQuiz(){
  const title=document.getElementById('qTitle').value.trim();
  const level=document.getElementById('qLevel').value;
  if(!title){showToast('Нэр оруулна уу');return;}
  const builders=document.querySelectorAll('.q-builder');
  const questions=[];
  for(const b of builders){
    const qtext=b.querySelector('[data-role=qtext]').value.trim();
    if(!qtext)continue;
    const opts=[...b.querySelectorAll('[data-role=opt]')].map(i=>i.value.trim());
    if(opts.some(o=>!o)){showToast('Бүх сонголтыг бөглөнө үү');return;}
    const checked=b.querySelector('.opt-radio:checked');
    questions.push({q:qtext,opts,ans:checked?parseInt(checked.value):0});
  }
  if(!questions.length){showToast('Дор хаяж нэг асуулт нэмнэ үү');return;}
  const quiz={id:'manual_'+Date.now(),title,level,questions,icon:'file-text',created:new Date().toLocaleDateString('mn-MN'),manual:true};
  ST.quizzes.unshift(quiz);save();
  document.getElementById('qTitle').value='';
  document.getElementById('qBuilderList').innerHTML='';
  qCount=0;
  document.getElementById('quizForm').classList.remove('open');
  renderQuizList();showToast('Тест хадгалагдлаа!');
}

// ==================== QUIZ LIST ====================
function renderQuizList(){
  const el=document.getElementById('quizCards');
  const visible=ST.quizzes.filter(q=>!q.id.startsWith('auto_'));
  if(!visible.length){
    el.innerHTML=`<div class="empty">${lucide('file-text',32)}<p style="margin-top:12px;">Тест байхгүй байна.<br>+ Тест нэмэх дарж нэмнэ үү.</p></div>`;
    return;
  }
  el.innerHTML=visible.map(q=>{
    const sc=ST.scores[q.id];
    const qicon=q.id.includes('grammar')?lucide('book-open',22):q.id.includes('vocab')||q.id.includes('esh')?lucide('graduation-cap',22):lucide('file-text',22);
    return`<div class="quiz-item" onclick="startQuiz('${q.id}')">
      <div style="display:flex;align-items:center;justify-content:center;width:44px;height:44px;background:var(--surface2);border-radius:10px;color:var(--accent);flex-shrink:0;">${qicon}</div>
      <div class="quiz-item-body">
        <div class="quiz-item-title">${q.title}</div>
        <div class="quiz-item-meta">${q.level} • ${q.questions.length} асуулт</div>
      </div>
      ${sc?`<div class="quiz-item-score">${sc.score}/${sc.total}</div>`:''}
      <div style="color:var(--muted);">${lucide('chevron-right',18)}</div>
    </div>`;
  }).join('');
}

// ==================== TAKE QUIZ ====================
function startQuiz(id){
  const quiz=ST.quizzes.find(q=>q.id===id);
  if(!quiz)return;
  QT={quiz,cur:0,correct:0};
  document.getElementById('takeTitleEl').textContent=quiz.title;
  document.getElementById('quizListView').style.display='none';
  document.getElementById('quizTakeView').classList.add('active');
  renderQCard();
}
function renderQCard(){
  const q=QT.quiz.questions[QT.cur];
  const tot=QT.quiz.questions.length;
  document.getElementById('takeProgEl').textContent=`${QT.cur+1} / ${tot}`;
  document.getElementById('progFill').style.width=(QT.cur/tot*100)+'%';
  const opts=q.opts.map((o,i)=>`<button class="q-opt" onclick="answerQ(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('');
  document.getElementById('qCardArea').innerHTML=`<div class="q-card"><div class="q-label">АСУУЛТ ${QT.cur+1}</div><div class="q-text">${q.q}</div><div class="q-opts">${opts}</div><div class="q-fb" id="qfb"></div></div>`;
}
function answerQ(idx){
  const q=QT.quiz.questions[QT.cur];
  const btns=document.querySelectorAll('.q-opt');
  btns.forEach(b=>b.disabled=true);
  const ok=idx===q.ans;
  if(ok)QT.correct++;
  btns[idx].classList.add(ok?'correct':'wrong');
  if(!ok)btns[q.ans].classList.add('correct');
  const fb=document.getElementById('qfb');
  fb.innerHTML=ok?`${lucide('check-circle',16)} Зөв!`:`${lucide('x-circle',16)} Буруу. Зөв хариулт: `+String.fromCharCode(65+q.ans)+'. '+q.opts[q.ans];
  fb.className='q-fb show '+(ok?'ok':'bad');
  setTimeout(()=>{QT.cur++;if(QT.cur>=QT.quiz.questions.length)showQuizResult();else renderQCard();},1800);
}
function showQuizResult(){
  const tot=QT.quiz.questions.length,sc=QT.correct;
  ST.scores[QT.quiz.id]={score:sc,total:tot,date:new Date().toLocaleDateString('mn-MN')};
  // Mark article as read after completing quiz
  if(QT.quiz.articleId){ST.read[QT.quiz.articleId]=true;}
  save();
  const pct=Math.round(sc/tot*100);
  const msg=sc===tot?'Төгс!':sc>=tot*0.8?'Гайхалтай!':sc>=tot*0.6?'Сайн байна!':'Дахин оролдоорой';
  document.getElementById('progFill').style.width='100%';
  document.getElementById('qCardArea').innerHTML=`
    <div class="result-box">
      <div class="result-big">${sc}<span>/${tot}</span></div>
      <div class="result-sub">${msg} · ${pct}%</div>
      <div class="result-detail"><div class="result-detail-title">ДҮНГИЙН ХУРААНГУЙ</div>
        <div style="display:flex;gap:24px;">
          <div><div style="font-size:1.4rem;color:var(--green);font-weight:600;">${sc}</div><div style="font-size:0.75rem;color:var(--muted);">Зөв</div></div>
          <div><div style="font-size:1.4rem;color:var(--red);font-weight:600;">${tot-sc}</div><div style="font-size:0.75rem;color:var(--muted);">Буруу</div></div>
          <div><div style="font-size:1.4rem;color:var(--accent);font-weight:600;">${pct}%</div><div style="font-size:0.75rem;color:var(--muted);">Оноо</div></div>
        </div>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn-main" style="flex:1;" onclick="startQuiz('${QT.quiz.id}')">${lucide('rotate-ccw',16)} Дахин</button>
        <button class="btn-ghost" onclick="endQuiz()" style="flex:1;">${lucide('arrow-left',16)} Буцах</button>
      </div>
    </div>`;
  renderQuizList();
}
function endQuiz(){
  document.getElementById('quizListView').style.display='block';
  document.getElementById('quizTakeView').classList.remove('active');
  document.getElementById('qCardArea').innerHTML='';
}

// ==================== GRAMMAR ====================
let gExCount=0;

function openGrammarForm(editId){
  const form=document.getElementById('grammarForm');
  document.getElementById('g-examples-list').innerHTML='';
  gExCount=0;
  if(editId){
    const rule=ST.grammar.find(r=>r.id===editId);
    if(!rule)return;
    document.getElementById('grammarFormTitle').innerHTML=`${lucide('edit-3',14)} Дүрэм засах`;
    document.getElementById('gEditId').value=editId;
    document.getElementById('g-name').value=rule.name;
    document.getElementById('g-desc').value=rule.desc;
    (rule.examples||[]).forEach(ex=>addGrammarExample(ex));
  } else {
    document.getElementById('grammarFormTitle').innerHTML=`${lucide('plus-circle',14)} Шинэ дүрэм нэмэх`;
    document.getElementById('gEditId').value='';
    document.getElementById('g-name').value='';
    document.getElementById('g-desc').value='';
    addGrammarExample();
  }
  form.classList.add('open');
  document.getElementById('g-name').focus();
}

function closeGrammarForm(){
  document.getElementById('grammarForm').classList.remove('open');
}

function addGrammarExample(val=''){
  gExCount++;
  const id='gex'+gExCount;
  const row=document.createElement('div');
  row.className='g-example-row';
  row.id=id;
  row.innerHTML=`<input class="form-input" placeholder="Жишээ: She works every day." value="${val.replace(/"/g,'&quot;')}"><button class="g-example-del" onclick="document.getElementById('${id}').remove()" title="Устгах">${lucide('x',13)}</button>`;
  document.getElementById('g-examples-list').appendChild(row);
}

function saveGrammar(){
  const name=document.getElementById('g-name').value.trim();
  const desc=document.getElementById('g-desc').value.trim();
  if(!name){showToast('Дүрмийн нэр оруулна уу');return;}
  if(!desc){showToast('Тайлбар оруулна уу');return;}
  const examples=[...document.querySelectorAll('#g-examples-list .g-example-row input')]
    .map(i=>i.value.trim()).filter(v=>v);
  const editId=document.getElementById('gEditId').value;
  if(editId){
    const idx=ST.grammar.findIndex(r=>r.id===editId);
    if(idx>-1) ST.grammar[idx]={...ST.grammar[idx],name,desc,examples};
  } else {
    ST.grammar.push({id:'gr'+Date.now(),name,desc,examples,created:new Date().toLocaleDateString('mn-MN')});
  }
  save();
  closeGrammarForm();
  renderGrammarList();
  showToast(editId?'Дүрэм засагдлаа!':'Дүрэм нэмэгдлээ!');
}

function deleteGrammar(id){
  if(!confirm('Энэ дүрмийг устгах уу?'))return;
  ST.grammar=ST.grammar.filter(r=>r.id!==id);
  save();
  renderGrammarList();
  showToast('Устгагдлаа');
}

function toggleGrammarCard(id){
  const card=document.getElementById('gc-'+id);
  if(card) card.classList.toggle('open');
}

function renderGrammarList(){
  const el=document.getElementById('grammarList');
  if(!ST.grammar||!ST.grammar.length){
    el.innerHTML=`<div class="grammar-empty"><span class="grammar-empty-icon">📖</span><p>Дүрэм байхгүй байна.<br>+ Дүрэм нэмэх дарж нэмнэ үү.</p></div>`;
    return;
  }
  el.innerHTML=ST.grammar.map(r=>`
    <div class="grammar-card" id="gc-${r.id}">
      <div class="grammar-card-top" onclick="toggleGrammarCard('${r.id}')">
        <div class="grammar-card-name">${r.name}</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div onclick="event.stopPropagation()" style="display:flex;gap:6px;">
            <button class="g-edit-btn" onclick="openGrammarForm('${r.id}')">${lucide('edit-3',13)}</button>
            <button class="g-del-btn" onclick="deleteGrammar('${r.id}')">✕</button>
          </div>
          <div class="grammar-card-arrow">›</div>
        </div>
      </div>
      <div class="grammar-card-body">
        <div class="grammar-card-desc">${r.desc}</div>
        ${r.examples&&r.examples.length?`<div class="grammar-examples">${r.examples.map(ex=>`<div class="grammar-example">${ex}</div>`).join('')}</div>`:''}
      </div>
    </div>`).join('');
}
